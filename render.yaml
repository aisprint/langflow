services:
  # A Docker web service
  - type: web
    name: langflow
    runtime: docker
    dockerfilePath: ./docker/render.Dockerfile
    repo: https://github.com/aisprint/langflow
    branch: main
    plan: standard
    healthCheckPath: /health_check
    autoDeploy: true
    envVars:
      - key: LANGFLOW_DATABASE_URL
        value: postgres://postgres:KBcE32Gv9FeUo1L@small-fog-539.flycast:5432
      - key: LANGFLOW_HOST
        value: 0.0.0.0
      - key: LANGFLOW_PORT
        # default render port https://docs.render.com/web-services#port-binding
        value: ${PORT}
      - key: LANGFLOW_LOG_LEVEL
        value: INFO
    disk:
      name: langflow-data
      mountPath: /app/data
